name: fah_retail
description: "FAH Retail - Accessories Store App with User and Admin capabilities"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Network
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Payment
  razorpay_flutter: ^1.3.6

  # UI & Animations
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  pin_code_fields: ^8.0.1

  # Charts (Admin Dashboard)
  fl_chart: ^0.66.2

  # Image Handling
  image_picker: ^1.0.7

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5

  # State Management (optional, for DI)
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
